<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beach Break — Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(180deg, #fceabb 0%, #7ec8e3 50%, #0d3b66 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #0a2540;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .back-link {
      align-self: flex-start;
      background: rgba(10, 37, 64, 0.85);
      color: #fceabb;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
      transition: background 0.2s;
    }

    .back-link:hover { background: #0a2540; }

    h1 {
      font-family: 'Palatino', serif;
      font-size: 3rem;
      color: #ffffff;
      text-shadow: 2px 3px 8px rgba(0,0,0,0.3);
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-style: italic;
      color: #fceabb;
      margin-bottom: 24px;
      text-align: center;
    }

    .game-panel {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 14px 40px rgba(10,37,64,0.35);
      max-width: 520px;
      width: 100%;
    }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: #0a2540;
      color: #fceabb;
      border-radius: 10px;
      font-family: 'Trebuchet MS', sans-serif;
      letter-spacing: 1.5px;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .scoreboard span { color: #ffffff; font-weight: 700; }

    canvas {
      display: block;
      margin: 0 auto;
      background: linear-gradient(135deg, #f8d089 0%, #fceabb 50%, #7ec8e3 100%);
      border: 3px solid #0a2540;
      border-radius: 10px;
      max-width: 100%;
      height: auto;
    }

    .controls {
      margin-top: 18px;
      text-align: center;
      color: #3a4a5a;
      font-size: 0.9rem;
    }

    .controls strong { color: #0a2540; }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button {
      background: #0a2540;
      color: #fceabb;
      border: none;
      padding: 10px 22px;
      border-radius: 20px;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    button:hover { background: #3a8fb7; transform: translateY(-2px); }
    button.accent { background: #f8d089; color: #0a2540; }
    button.accent:hover { background: #ffffff; }

    .mobile-pad {
      display: grid;
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px;
      gap: 8px;
      justify-content: center;
      margin: 18px auto 0;
    }

    .pad-btn {
      background: #0a2540;
      color: #fceabb;
      border: none;
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0;
    }
    .pad-btn:hover { background: #3a8fb7; }

    .pad-up    { grid-column: 2; grid-row: 1; }
    .pad-left  { grid-column: 1; grid-row: 2; }
    .pad-down  { grid-column: 2; grid-row: 2; }
    .pad-right { grid-column: 3; grid-row: 2; }

    .overlay {
      display: none;
      text-align: center;
      padding: 20px;
      background: rgba(10, 37, 64, 0.92);
      color: #fceabb;
      border-radius: 10px;
      margin-top: 12px;
    }

    .overlay h2 {
      font-family: 'Palatino', serif;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <a href="scratch.html" class="back-link">← Back to Surf Page</a>

  <h1>🏝️ Beach Break</h1>
  <p class="subtitle">Eat the coconuts. Avoid the reef. Catch the wave.</p>

  <div class="game-panel">

    <div class="scoreboard">
      <div>Score: <span id="score">0</span></div>
      <div>High: <span id="high">0</span></div>
    </div>

    <canvas id="game" width="480" height="480"></canvas>

    <div class="overlay" id="overlay">
      <h2 id="overlayTitle">Ready to Surf?</h2>
      <p id="overlayMsg">Press Start or use arrow keys.</p>
    </div>

    <div class="controls">
      <p><strong>Desktop:</strong> Arrow keys or WASD</p>
      <p><strong>Mobile:</strong> Tap the pad below</p>

      <div class="btn-row">
        <button id="startBtn" class="accent">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="mobile-pad">
        <button class="pad-btn pad-up"    data-dir="up">▲</button>
        <button class="pad-btn pad-left"  data-dir="left">◀</button>
        <button class="pad-btn pad-down"  data-dir="down">▼</button>
        <button class="pad-btn pad-right" data-dir="right">▶</button>
      </div>
    </div>

  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highEl = document.getElementById('high');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayMsg = document.getElementById('overlayMsg');

    const GRID = 20;
    const CELL = canvas.width / GRID;

    let snake, dir, nextDir, food, reef, score, running, paused, tickInterval;
    let highScore = 0;

    function init() {
      snake = [
        { x: 10, y: 10 },
        { x: 9,  y: 10 },
        { x: 8,  y: 10 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      reef = spawnReef();
      food = spawnFood();
      scoreEl.textContent = score;
      running = false;
      paused = false;
    }

    function spawnFood() {
      let pos;
      while (true) {
        pos = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
        if (!snake.some(s => s.x === pos.x && s.y === pos.y) &&
            !reef.some(r => r.x === pos.x && r.y === pos.y)) break;
      }
      return pos;
    }

    function spawnReef() {
      const rocks = [];
      const count = 4;
      for (let i = 0; i < count; i++) {
        let pos;
        while (true) {
          pos = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
          const tooCloseToSnake = snake.some(s => Math.abs(s.x - pos.x) < 3 && Math.abs(s.y - pos.y) < 3);
          const overlapsOther = rocks.some(r => r.x === pos.x && r.y === pos.y);
          if (!tooCloseToSnake && !overlapsOther) break;
        }
        rocks.push(pos);
      }
      return rocks;
    }

    function draw() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#fceabb');
      gradient.addColorStop(0.5, '#f8d089');
      gradient.addColorStop(1, '#7ec8e3');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(10, 37, 64, 0.06)';
      ctx.lineWidth = 1;
      for (let i = 1; i < GRID; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
      }

      reef.forEach(r => {
        ctx.fillStyle = '#6b4a2b';
        ctx.beginPath();
        ctx.arc(r.x * CELL + CELL/2, r.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#8a6540';
        ctx.beginPath();
        ctx.arc(r.x * CELL + CELL/2 - 2, r.y * CELL + CELL/2 - 2, CELL/4, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = '#4a2e1a';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8b5a2b';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL/2 - 2, food.y * CELL + CELL/2 - 2, CELL/4, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((seg, i) => {
        if (i === 0) {
          ctx.fillStyle = '#0a2540';
          ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = '#fceabb';
          const eyeOffsetX = dir.x !== 0 ? (dir.x > 0 ? CELL * 0.65 : CELL * 0.25) : CELL * 0.3;
          const eyeOffsetX2 = dir.x !== 0 ? (dir.x > 0 ? CELL * 0.65 : CELL * 0.25) : CELL * 0.7;
          const eyeOffsetY = dir.y !== 0 ? (dir.y > 0 ? CELL * 0.65 : CELL * 0.25) : CELL * 0.3;
          const eyeOffsetY2 = dir.y !== 0 ? (dir.y > 0 ? CELL * 0.65 : CELL * 0.25) : CELL * 0.7;
          ctx.beginPath(); ctx.arc(seg.x * CELL + eyeOffsetX,  seg.y * CELL + eyeOffsetY,  2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(seg.x * CELL + eyeOffsetX2, seg.y * CELL + eyeOffsetY2, 2, 0, Math.PI * 2); ctx.fill();
        } else {
          const fade = 1 - (i / snake.length) * 0.4;
          ctx.fillStyle = `rgba(58, 143, 183, ${fade})`;
          ctx.fillRect(seg.x * CELL + 2, seg.y * CELL + 2, CELL - 4, CELL - 4);
        }
      });
    }

    function tick() {
      if (!running || paused) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver('Wiped out on the wall!');
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver('Got tangled in your own tail.');
      if (reef.some(r => r.x === head.x && r.y === head.y)) return gameOver('Hit the reef! Ouch.');

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > highScore) {
          highScore = score;
          highEl.textContent = highScore;
        }
        food = spawnFood();
        if (score % 5 === 0) {
          reef.push(spawnFood());
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver(msg) {
      running = false;
      clearInterval(tickInterval);
      showOverlay('Game Over', msg + ' Final score: ' + score);
    }

    function start() {
      if (running) return;
      if (!snake) init();
      hideOverlay();
      running = true;
      paused = false;
      clearInterval(tickInterval);
      tickInterval = setInterval(tick, 110);
    }

    function pause() {
      if (!running) return;
      paused = !paused;
      if (paused) showOverlay('Paused', 'Press Pause again or any arrow to resume.');
      else hideOverlay();
    }

    function reset() {
      clearInterval(tickInterval);
      init();
      draw();
      showOverlay('Ready to Surf?', 'Press Start or an arrow key to begin.');
    }

    function showOverlay(title, msg) {
      overlay.style.display = 'block';
      overlayTitle.textContent = title;
      overlayMsg.textContent = msg;
    }
    function hideOverlay() { overlay.style.display = 'none'; }

    function setDir(newDir) {
      if (newDir.x === -dir.x && newDir.y === -dir.y) return;
      nextDir = newDir;
      if (paused) { paused = false; hideOverlay(); }
      if (!running) start();
    }

 document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      const gameKeys = ['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd', ' '];
      if (gameKeys.includes(key)) e.preventDefault();

      if (key === 'arrowup'    || key === 'w') setDir({ x: 0,  y: -1 });
      if (key === 'arrowdown'  || key === 's') setDir({ x: 0,  y:  1 });
      if (key === 'arrowleft'  || key === 'a') setDir({ x: -1, y:  0 });
      if (key === 'arrowright' || key === 'd') setDir({ x: 1,  y:  0 });
      if (key === ' ') pause();
    });

    document.querySelectorAll('.pad-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const d = btn.dataset.dir;
        if (d === 'up')    setDir({ x: 0,  y: -1 });
        if (d === 'down')  setDir({ x: 0,  y:  1 });
        if (d === 'left')  setDir({ x: -1, y:  0 });
        if (d === 'right') setDir({ x: 1,  y:  0 });
      });
    });

    document.getElementById('startBtn').addEventListener('click', start);
    document.getElementById('pauseBtn').addEventListener('click', pause);
    document.getElementById('resetBtn').addEventListener('click', reset);

    init();
    draw();
    showOverlay('Ready to Surf?', 'Press Start or an arrow key to begin.');
  </script>

</body>
</html>
